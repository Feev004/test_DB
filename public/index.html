<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test_db</title>
  </head>
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      /* overflow: auto; */
      background-color: rgba(0, 0, 0, 0.5);
    }
    .modal-content {
      background-color: white;
      margin: 0% auto;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
  </style>
  <body onload="init()">
    <h2>รายการสินค้าทั้งหมด (ข้อมูลจาก MySQL)</h2>
    <form id="fileInput" onsubmit="return false;">
      <input type="text" id="name" placeholder="ชื่อสินค้า" required />
      <input type="number" id="price" placeholder="ราคา" required />
      <!-- <input type="number" id="category_id" placeholder="ID ประเภทสินค้า" required /> -->
      <select id="categorySelect">
        <option value="4">เลือกประเภท</option>
        <option value="1">เครื่องใช้ไฟฟ้า</option>
        <option value="2">อุปกรณ์ไอที</option>
        <option value="3">เครื่องดื่ม</option>
      </select>
      <br />
      <input type="file" id="image" />
      <button type="button" onclick="saveProduct()">เพิ่มสินค้า</button>
    </form>
    <div id="display"></div>
    <div id="productModal" class="modal">
      <div class="modal-content">
        <h3>แก้ไขข้อมูลสินค้า</h3>
        <input type="hidden" id="edit_id" />
        <p>
          ชื่อสินค้า:
          <input type="text" id="edit_name" placeholder="ชื่อสินค้า" />
        </p>
        <p>ราคา: <input type="number" id="edit_price" placeholder="ราคา" /></p>
        <p>
          หมวดหมู่:
          <select id="edit_category"></select>
        </p>
        <p>
          รูปภาพปัจจุบัน: <br />
          <img id="current_image" src="" width="100px" />
        </p>
        <p>
          เลือกรูปใหม่:
          <input
            type="file"
            id="edit_image"
            accept="image/*"
            onchange="previewImage(event)"
          />
        </p>
        <hr />
        <button onclick="saveData()">บันทึกการแก้ไข</button>
        <button onclick="closeModal()">ปิดหน้าต่าง</button>
      </div>
    </div>
    <script>
      async function loadProducts() {
        try {
          const response = await fetch("/api/products");
          const products = await response.json();

          let html = `
                          <table border="1">
                              <tr style="background-color: #eee;">
                                  <th>ID</th>
                                  <th>ชื่อสินค้า</th>
                                  <th>ราคา</th>
                                  <th>ประเภท</th>
                                  <th>รูปภาพ</th>
                                  <th>ลบข้อมูล</th>
                              </tr>`;

          products.forEach((p) => {
            html += `
                                  <tr>
                                      <td>${p.id}</td>
                                      <td>${p.name}</td>
                                      <td>${p.price}</td>
                                      <td>${p.category_name}</td>
                                      <td><img src="${p.image_url}" width="100" height="100"></td>
                                      <td><a href="#" onclick="deleteProduct(${p.id})">ลบ</a></td>
                                  </tr>`;
          });

          html += `</table>`;

          document.getElementById("display").innerHTML = html;
        } catch (error) {
          console.error("Error : ", error);
          document.getElementById("display").innerHTML =
            "เกิดข้อผิดพลาดในการโหลดข้อมูล";
        }
      }
      async function addProduct() {
        const fileInput = document.getElementById("fileInput");

        const data = {
          name: document.getElementById("name").value,
          price: document.getElementById("price").value,
          category_id: document.getElementById("categorySelect").value,
          image_name: fileInput.files[0].name,
        };

        await fetch("/api/products", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        alert("บันทึกเรียบร้อย");
      }

      async function saveProduct() {
        const name = document.getElementById("name").value;
        const price = document.getElementById("price").value;
        const category_id = document.getElementById("categorySelect").value;
        const fileInput = document.getElementById("image");
        const formData = new FormData();
        formData.append("name", name);
        formData.append("price", price);
        formData.append("category_id", category_id);
        if (fileInput.files[0]) {
          formData.append("image", fileInput.files[0]);
        }
        const response = await fetch("/api/products", {
          method: "POST",
          body: formData,
        });
        const result = await response.json();
        alert(result.message);
        location.reload();
      }

      async function deleteProduct(id) {
        if (confirm("คุณแน่ใจว่าต้องการลบสินค้านี้?")) {
          try {
            const response = await fetch(`/api/products/${id}`, {
              method: "DELETE",
            });
            const result = await response.json();
            alert(result.message);
            loadProducts();
          } catch (error) {
            alert("เกิดข้อผิดพลาดในการลบข้อมูล");
            console.error("Error : ", error);
          }
        }
      }

      async function init() {
        await loadCategories();
        await loadProducts();
      }
      async function loadCategories() {
        const res = await fetch("/api/categories"); // เดี๋ยวไปเขียนบน server.js
        const categories = await res.json();
        let options = '<option value="">-- เลือกหมวดหมู่ --</option>';
        categories.forEach((c) => {
          options += `<option value="${c.id}">${c.name}</option>`;
        });
        document.getElementById("edit_category").innerHTML = options;
      }
      async function loadProducts() {
        const res = await fetch("/api/products");
        const products = await res.json();
        let html = `
              <table border=1>
                <tr>
                  <th>รูปภาพ</th>
                  <th>ID</th>
                  <th>ชื่อสินค้า</th>
                  <th>ราคา</th>
                  <th>หมวดหมู่</th>
                  <th>จัดการ</th>
                  <th>ลบข้อมูล</th>
                </tr>`;
        products.forEach((p) => {
          html += `
                <tr>
                  <td><img src="${p.image_url}" width=50px></td>
                  <td>${p.id}</td>
                  <td>${p.name}</td>
                  <td>${p.price}</td>
                  <td>${p.category_name || "ไม่ระบุ"}</td>
                  <td><a href='#' onclick="openModal(${p.id})">แก้ไข </a></td>
                  <td><a href="#" onclick="deleteProduct(${p.id})">ลบ</a></td>
                  </tr>`;
        });
        html += "</table>";
        document.getElementById("display").innerHTML = html;
      }
      async function openModal(id) {
        console.log("คลิกแล้ว ID คือ:", id);
        document.getElementById("productModal").style.display = "block";

        try {
          const res = await fetch(`/api/products/${id}`);
          if (!res.ok) throw new Error("ดึงข้อมูลจาก Server ไม่ได้");

          const p = await res.json();
          console.log("ข้อมูลที่ได้จาก Server:", p);
          document.getElementById("edit_id").value = p.id;
          document.getElementById("edit_name").value = p.name;
          document.getElementById("edit_price").value = p.price;
          document.getElementById("edit_category").value = p.category_id;
          document.getElementById("current_image").src = p.image_url;
        } catch (err) {
          console.error("เกิดข้อผิดพลาด:", err);
          // alert("ไม่สามารถโหลดข้อมูลสินค้าได้: " + err.message);
        }
      }
      async function saveData() {
        const id = document.getElementById("edit_id").value;
        const formData = new FormData();
        formData.append("name", document.getElementById("edit_name").value);
        formData.append("price", document.getElementById("edit_price").value);
        formData.append(
          "category_id",
          document.getElementById("edit_category").value,
        );

        const fileInput = document.getElementById("edit_image");
        if (fileInput.files[0]) {
          formData.append("image", fileInput.files[0]); // ส่งไฟล์รูปภาพใหม่
        }

        try {
          const res = await fetch(`/api/products/${id}`, {
            method: "PUT",
            body: formData,
          });
          if (res.ok) {
            alert("บันทึกข้อมูลสำเร็จ!");
            closeModal();
            loadProducts();
          }
        } catch (err) {
          console.error("Error:", err);
        }
      }
      function closeModal() {
        document.getElementById("productModal").style.display = "none";
      }
      function previewImage(event) {
        const reader = new FileReader();
        const file = event.target.files[0];

        if (file) {
          reader.onload = function () {
            const output = document.getElementById("current_image");
            output.src = reader.result;
          };
          reader.readAsDataURL(file);
        }
      }
      loadProducts();
    </script>
  </body>
</html>
